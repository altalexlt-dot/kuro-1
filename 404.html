<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 · Página no encontrada — Kuro 黑</title>
  <meta name="robots" content="noindex, nofollow"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@300;400&family=Cormorant+Garamond:ital,wght@0,200;0,300;1,300&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --black: #050505; --bg: #0A0A0A; --surface: #131313;
      --border: rgba(255,255,255,0.06); --border-hi: rgba(255,255,255,0.1);
      --cream: #EDE9E2; --ash: #A8A39A; --ash-dim: #6B6560;
      --red: #C1121F;
      --f-display: 'Cinzel', serif;
      --f-serif: 'Cormorant Garamond', serif;
    }
    html, body { height: 100%; }
    body {
      background: var(--bg);
      color: var(--cream);
      font-family: var(--f-serif);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      text-align: center;
      overflow: hidden;
    }
    .kanji-bg {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: var(--f-display);
      font-size: clamp(16rem, 40vw, 32rem);
      color: rgba(255,255,255,0.018);
      line-height: 1;
      pointer-events: none;
      user-select: none;
      z-index: 0;
    }
    .content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      max-width: 600px;
    }
    .logo {
      font-family: var(--f-display);
      font-size: 1.2rem;
      letter-spacing: 0.4em;
      color: var(--ash-dim);
      margin-bottom: 1rem;
    }
    .logo span { color: var(--red); }
    .num {
      font-family: var(--f-display);
      font-size: clamp(6rem, 18vw, 12rem);
      font-weight: 300;
      line-height: 1;
      color: var(--border-hi);
      letter-spacing: -0.04em;
    }
    .num span { color: var(--red); }
    .line-red {
      width: 60px;
      height: 1px;
      background: var(--red);
    }
    .title {
      font-family: var(--f-display);
      font-size: clamp(1.5rem, 4vw, 2.5rem);
      font-weight: 300;
      letter-spacing: 0.05em;
    }
    .subtitle {
      font-family: var(--f-serif);
      font-style: italic;
      font-size: clamp(1rem, 2vw, 1.2rem);
      color: var(--ash);
      line-height: 1.8;
      max-width: 420px;
    }
    .btn {
      display: inline-block;
      margin-top: 1rem;
      font-family: var(--f-display);
      font-size: 0.55rem;
      letter-spacing: 0.45em;
      text-transform: uppercase;
      color: var(--cream);
      border: 1px solid var(--border-hi);
      padding: 1.2rem 3.5rem;
      text-decoration: none;
      position: relative;
      overflow: hidden;
      transition: border-color 0.4s;
    }
    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--red);
      transform: translateY(101%);
      transition: transform 0.45s cubic-bezier(0.16,1,0.3,1);
    }
    .btn:hover::before { transform: translateY(0); }
    .btn:hover { border-color: var(--red); }
    .btn span { position: relative; z-index: 1; }
    .divider {
      width: 100%;
      border: none;
      border-top: 1px solid var(--border);
      margin: 0.5rem 0;
    }
    .links {
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .links a {
      font-family: var(--f-serif);
      font-style: italic;
      font-size: 1rem;
      color: var(--ash);
      text-decoration: none;
      transition: color 0.3s;
    }
    .links a:hover { color: var(--cream); }
  </style>
</head>
<body>
  <div class="kanji-bg" aria-hidden="true">迷</div>
  <div class="content">
    <div class="logo">KURO <span>黑</span></div>
    <div class="num">4<span>0</span>4</div>
    <div class="line-red"></div>
    <h1 class="title">Página no encontrada</h1>
    <p class="subtitle">Como en el <em>wabi-sabi</em>, no todo sigue el camino previsto. Esta página no existe, pero la experiencia sí.</p>
    <a href="/" class="btn"><span>Volver al inicio</span></a>
    <hr class="divider"/>
    <nav class="links" aria-label="Links rápidos">
      <a href="carta.html">La Carta</a>
      <a href="/#omakase">Omakase</a>
      <a href="/#booking">Reservas</a>
      <a href="/#chef">El Chef</a>
    </nav>
  </div>
</body>
</html>
